# ShuleHub API — Kubernetes Deployment
# Supports horizontal pod autoscaling with readiness/liveness probes
---
apiVersion: v1
kind: Namespace
metadata:
  name: shule-hub
  labels:
    app.kubernetes.io/part-of: shule-hub

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: shule-hub
data:
  APP_RUNTIME: "server"
  EVENTS_DISPATCHER_ENABLED: "false"
  EVENTS_WORKER_ENABLED: "false"
  OBSERVABILITY_SLO_BACKGROUND_ENABLED: "false"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shule-hub
  labels:
    app: shule-hub-api
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shule-hub-api
  template:
    metadata:
      labels:
        app: shule-hub-api
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: shule-hub-api:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shule-hub
spec:
  selector:
    app: shule-hub-api
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: shule-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: shule-hub
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: shule-hub-api
