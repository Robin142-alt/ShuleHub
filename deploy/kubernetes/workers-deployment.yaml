# ShuleHub Workers — Kubernetes Deployments
# Payments worker and Events worker with independent scaling
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-worker-config
  namespace: shule-hub
data:
  APP_RUNTIME: "worker"
  EVENTS_DISPATCHER_ENABLED: "false"
  EVENTS_WORKER_ENABLED: "false"
  OBSERVABILITY_SLO_BACKGROUND_ENABLED: "false"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-worker
  namespace: shule-hub
  labels:
    app: shule-hub-payments-worker
    component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shule-hub-payments-worker
  template:
    metadata:
      labels:
        app: shule-hub-payments-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: payments-worker
          image: shule-hub-api:latest
          command: ["node", "dist/apps/api/src/payments-worker.js"]
          envFrom:
            - configMapRef:
                name: payments-worker-config
            - secretRef:
                name: api-secrets
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 350m
              memory: 384Mi

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-worker-hpa
  namespace: shule-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: events-worker-config
  namespace: shule-hub
data:
  APP_RUNTIME: "worker"
  EVENTS_DISPATCHER_ENABLED: "true"
  EVENTS_WORKER_ENABLED: "true"
  OBSERVABILITY_SLO_BACKGROUND_ENABLED: "false"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-worker
  namespace: shule-hub
  labels:
    app: shule-hub-events-worker
    component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shule-hub-events-worker
  template:
    metadata:
      labels:
        app: shule-hub-events-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: events-worker
          image: shule-hub-api:latest
          command: ["node", "dist/apps/api/src/events-worker.js"]
          envFrom:
            - configMapRef:
                name: events-worker-config
            - secretRef:
                name: api-secrets
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 350m
              memory: 384Mi

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: events-worker-hpa
  namespace: shule-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: events-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
